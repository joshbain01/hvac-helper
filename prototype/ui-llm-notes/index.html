<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HVAC Helper Pro - LLM Notes Prototype</title>
  <style>
    :root { color-scheme:light; --ink:#17212b; --muted:#596775; --line:#c8d1da; --panel:#f7f9fb; --good:#1f7a4d; --warn:#a15c00; --bad:#b42318; --blue:#1d5f9f; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,sans-serif; color:var(--ink); background:#eef3f7; }
    header { padding:18px 20px; background:#12344f; color:white; display:flex; justify-content:space-between; gap:16px; align-items:center; }
    header h1 { font-size:20px; margin:0; }
    header p { margin:4px 0 0; color:#d4e6f5; font-size:13px; }
    main { padding:18px; display:grid; grid-template-columns:320px 1fr; gap:16px; }
    .panel,.card { background:white; border:1px solid var(--line); border-radius:8px; padding:14px; }
    .panel h2,.card h2 { font-size:15px; margin:0 0 10px; }
    textarea { width:100%; min-height:120px; resize:vertical; font:15px/1.4 Arial; padding:10px; border:1px solid var(--line); border-radius:6px; }
    button { min-height:44px; border:1px solid #8aa1b8; background:#f9fbfd; border-radius:6px; font-weight:700; cursor:pointer; }
    button.primary { background:#1d5f9f; color:white; border-color:#1d5f9f; }
    button.good { background:#e6f4ee; color:var(--good); border-color:#8fceb1; }
    .stack { display:grid; gap:10px; }
    .tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .tabs button.active { outline:3px solid #f2b84b; }
    .layout { display:grid; grid-template-columns:1fr 320px; gap:16px; }
    .note { font-size:18px; line-height:1.45; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .chip { display:flex; align-items:center; gap:6px; padding:9px 10px; border:1px solid var(--line); border-radius:999px; background:#fff; font-weight:700; }
    .chip-x { border:none; background:none; cursor:pointer; color:var(--bad); font-size:18px; min-height:unset; padding:0; line-height:1; font-weight:900; }
    .add-row { display:flex; gap:8px; align-items:center; }
    .add-row input { padding:9px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; width:180px; }
    .add-row button { min-height:38px; padding:0 14px; font-size:14px; }
    .metric { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #e4eaf0; font-size:14px; }
    .wizard-step { border-left:6px solid var(--blue); padding:12px; background:#f7fbff; border-radius:6px; }
    .oom-banner { background:#fff3cd; border:2px solid #d4820a; border-radius:8px; padding:12px 16px; font-weight:700; color:#7c4700; display:flex; align-items:center; gap:10px; font-size:15px; }
    .ok { color:var(--good); font-weight:700; }
    .danger { color:var(--bad); font-weight:700; }
    .footerbar { position:fixed; left:50%; bottom:14px; transform:translateX(-50%); background:#102a43; color:white; padding:8px; border-radius:8px; display:flex; gap:8px; box-shadow:0 8px 24px #0003; }
    .footerbar button { min-height:38px; color:white; background:#284b66; border-color:#496a84; }
    #timer { font-size:15px; font-weight:700; }
    .t-ok { color:#a3e0bf; }
    .t-low { color:#ffd580; }
    .t-exp { color:#ff8a8a; }
    .t-done { color:#6be8a0; }
    @media (max-width:820px) { main,.layout { grid-template-columns:1fr; } header { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>LLM Work Note &amp; Consumables Prototype</h1>
      <p>Question: can technicians review, correct, and approve AI-expanded notes in under 15 seconds?</p>
    </div>
    <span id="timer" class="t-ok">Timer: 15s</span>
  </header>
  <main>
    <aside class="panel stack">
      <h2>Technician Dictation</h2>
      <textarea id="dictation">Cleaned condenser coil, changed 16x25x1 filter, added half pound 410A, checked delta T and subcooling. System cooling properly.</textarea>
      <button class="primary" id="expand">Expand Note (reset timer)</button>
      <button id="toggle-oom">Toggle OOM Fallback (Q4)</button>
      <div class="metric"><span>Mode</span><strong id="mode">Local LLM</strong></div>
      <div class="metric"><span>Confidence</span><strong id="confidence">92%</strong></div>
      <div class="metric"><span>Consumables</span><strong id="count">2</strong></div>
      <div class="tabs">
        <button data-view="inline" class="active">Inline</button>
        <button data-view="wizard">Wizard</button>
        <button data-view="compare">Compare</button>
      </div>
    </aside>
    <section class="layout">
      <article class="card stack">
        <h2 id="view-title">Inline Review</h2>
        <div id="content"></div>
      </article>
      <aside class="card stack">
        <h2>Full Prototype State (Q5)</h2>
        <pre id="state" style="font-size:12px;overflow:auto;max-height:500px;margin:0"></pre>
      </aside>
    </section>
  </main>
  <nav class="footerbar">
    <button data-view="inline">Inline</button>
    <button data-view="wizard">Wizard</button>
    <button data-view="compare">Compare</button>
  </nav>
  <script>
    const state = {
      view: 'inline', oom: false, seconds: 15,
      consumables: ['16x25x1 filter', 'R-410A 0.5 lb'],
      approved: false, approvedAtSeconds: null, timerExpired: false,
    };
    const expanded = 'Performed cooling system maintenance. Cleaned the outdoor condenser coil, replaced the 16×25×1 air filter, added 0.5 lb of R-410A refrigerant, and verified Delta T and subcooling. System was operating within expected cooling range at completion.';
    const fallback  = 'Cleaned coil. Replaced filter. Added refrigerant. Verified operation.';
    const $ = id => document.getElementById(id);

    // Q3: editable consumable chips
    function chipsHTML() {
      const chips = state.consumables.map((c, i) =>
        `<span class="chip">${c}<button class="chip-x" data-rm="${i}" title="Remove">×</button></span>`
      ).join('');
      return `<div class="chips">${chips}</div>
              <div class="add-row"><input id="chip-in" placeholder="Add item…"/><button id="chip-add">+ Add</button></div>`;
    }

    // Q2: approve available in all three layouts
    function approveHTML() {
      return state.approved
        ? `<p class="ok">✓ Approved (${15 - state.approvedAtSeconds}s into review)</p>`
        : `<button class="good" id="approve">Approve Note + Items</button>`;
    }

    // Q4: prominent OOM warning in main content area, not just the sidebar
    function oomBannerHTML() {
      return state.oom
        ? `<div class="oom-banner">⚠ FALLBACK MODE — OOM condition. Local LLM did not run. Note quality is reduced; details may be missing.</div>`
        : '';
    }

    function render() {
      const note = state.oom ? fallback : expanded;
      $('mode').textContent       = state.oom ? 'Fallback template' : 'Local LLM';
      $('confidence').textContent = state.oom ? 'N/A' : '92%';
      $('count').textContent      = String(state.consumables.length);

      // Q1: timer tracks outcome
      const t = $('timer');
      if (state.approved) {
        t.className = 't-done';
        t.textContent = `✓ Approved in ${15 - state.approvedAtSeconds}s`;
      } else if (state.timerExpired) {
        t.className = 't-exp';
        t.textContent = '⚠ 15s expired — not approved';
      } else {
        t.className = state.seconds <= 5 ? 't-low' : 't-ok';
        t.textContent = `Timer: ${state.seconds}s`;
      }

      document.querySelectorAll('[data-view]').forEach(b =>
        b.classList.toggle('active', b.dataset.view === state.view)
      );

      if (state.view === 'inline') {
        $('view-title').textContent = 'Inline Review';
        $('content').innerHTML = `
          ${oomBannerHTML()}
          <div class="note">${note}</div>
          ${chipsHTML()}
          ${approveHTML()}`;
      } else if (state.view === 'wizard') {
        $('view-title').textContent = '15-Second Wizard';
        $('content').innerHTML = `
          ${oomBannerHTML()}
          <div class="wizard-step"><strong>1. Note</strong><p>${note}</p></div>
          <div class="wizard-step"><strong>2. Consumables</strong>${chipsHTML()}</div>
          <div class="wizard-step"><strong>3. Final Tap</strong>
            <p>${state.approved ? '<span class="ok">Approved for snapshot.</span>' : '<span class="danger">Needs technician approval.</span>'}</p>
            ${approveHTML()}
          </div>`;
      } else {
        $('view-title').textContent = 'Raw vs Expanded';
        $('content').innerHTML = `
          ${oomBannerHTML()}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="note"><strong>Raw dictation:</strong><br><br>${$('dictation').value}</div>
            <div class="note"><strong>AI expanded:</strong><br><br>${note}</div>
          </div>
          ${chipsHTML()}
          ${approveHTML()}`;
      }

      // Wire chip removes
      document.querySelectorAll('[data-rm]').forEach(btn => {
        btn.onclick = () => { state.consumables.splice(+btn.dataset.rm, 1); render(); };
      });
      // Wire chip add
      const addBtn = $('chip-add'), chipIn = $('chip-in');
      if (addBtn) addBtn.onclick = () => {
        const v = chipIn.value.trim();
        if (v) { state.consumables.push(v); chipIn.value = ''; render(); }
      };
      if (chipIn) chipIn.onkeydown = e => { if (e.key === 'Enter') addBtn.click(); };
      // Wire approve
      const approveBtn = $('approve');
      if (approveBtn) approveBtn.onclick = () => {
        state.approved = true;
        state.approvedAtSeconds = state.seconds;
        render();
      };

      $('state').textContent = JSON.stringify(state, null, 2);
    }

    document.querySelectorAll('[data-view]').forEach(b =>
      b.onclick = () => { state.view = b.dataset.view; render(); }
    );
    $('toggle-oom').onclick = () => { state.oom = !state.oom; render(); };
    $('expand').onclick = () => {
      state.seconds = 15; state.approved = false;
      state.approvedAtSeconds = null; state.timerExpired = false;
      render();
    };

    setInterval(() => {
      if (state.approved || state.timerExpired) return;
      state.seconds = Math.max(0, state.seconds - 1);
      if (state.seconds === 0) state.timerExpired = true;
      render();
    }, 1000);

    render();
  </script>
</body>
</html>
